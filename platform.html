<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ancestral Threads | Family Lineage Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #e9dbc7 0%, #d8cdb4 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 250, 240, 0.95);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .main-header {
            background: linear-gradient(135deg, #5a3e2b 0%, #3e2a1c 100%);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo h1 {
            color: #ffefd5;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #c9ae86;
            font-size: 0.8rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
        }

        .user-info span {
            color: #ffefd5;
        }

        .admin-badge {
            background: #ffd700;
            color: #5a3e2b;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .logout-btn {
            background: #c09a6b;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 2rem 0 2rem;
            background: #fcf8ef;
            border-bottom: 2px solid #e2cfb0;
        }

        .tab-btn {
            background: transparent;
            color: #8b6946;
            padding: 0.8rem 1.5rem;
            border-radius: 1rem 1rem 0 0;
            font-weight: 600;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #fff5e6;
            color: #5a3e2b;
            border-bottom: 3px solid #c2894b;
        }

        .tab-content {
            display: none;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-section {
            background: #fef7ed;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .search-form div {
            flex: 2;
            min-width: 200px;
        }

        .search-form label {
            display: block;
            font-weight: 600;
            color: #5e3c22;
            margin-bottom: 0.4rem;
        }

        .search-form input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 2px solid #e0cfb6;
            border-radius: 1rem;
            background: white;
        }

        .search-form button {
            background: #8b5a2b;
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
        }

        .lineage-container {
            background: #fcf8ef;
            border-radius: 1.5rem;
            padding: 1.5rem;
            overflow-x: auto;
        }

        .tree-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #4f321b;
            margin-bottom: 1rem;
            border-left: 6px solid #c2894b;
            padding-left: 1rem;
        }

        .family-tree {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tree-node {
            text-align: center;
            background: linear-gradient(145deg, #fff6e8, #ffefdd);
            border-radius: 1rem;
            padding: 0.6rem 1.4rem;
            margin: 0.5rem;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            border: 1px solid #e7cfb0;
            font-weight: 500;
            color: #4a2f1a;
            min-width: 140px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .tree-node:hover {
            transform: translateY(-5px) scale(1.02);
        }

        .generation {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin: 1rem 0;
        }

        .gen-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: bold;
            color: #b08052;
            text-align: center;
            width: 100%;
            margin-top: 1rem;
        }

        .connector-line {
            text-align: center;
            font-size: 1.4rem;
            color: #c2a075;
        }

        .admin-stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1.5rem;
            border-radius: 1.5rem;
            color: white;
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.2);
            padding: 1rem;
            border-radius: 1rem;
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }

        .names-list {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .names-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .name-item {
            background: #f5ede1;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
        }

        .admin-form {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #5e3c22;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.7rem;
            border: 2px solid #e0cfb6;
            border-radius: 0.8rem;
        }

        .submit-btn {
            background: #5a3e2b;
            color: white;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
        }

        .success-msg, .error-msg {
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
        }

        .success-msg.show, .error-msg.show {
            display: block;
        }

        .success-msg {
            background: #d4edda;
            color: #155724;
        }

        .error-msg {
            background: #f8d7da;
            color: #721c24;
        }

        .loading {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #c2894b;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="main-header">
        <div class="logo">
            <h1>📜 Ancestral Threads</h1>
            <span>family lineage visualizer (Supabase - Working!)</span>
        </div>
        <div class="user-info">
            <span>👋 <span id="usernameDisplay"></span></span>
            <span id="adminBadge" class="admin-badge" style="display: none;">👑 ADMIN</span>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="view">🔍 View Lineage</button>
        <button class="tab-btn" data-tab="admin" id="adminTabBtn" style="display: none;">👑 Admin Panel</button>
    </div>

    <div id="viewTab" class="tab-content active">
        <div class="search-section">
            <form id="searchForm" class="search-form">
                <div>
                    <label>👤 Search Family Member</label>
                    <input type="text" id="searchName" placeholder="e.g., Emma, Lucas, Sophia...">
                </div>
                <button type="submit">🌿 Reveal Lineage</button>
            </form>
            <div id="searchStatus" style="margin-top: 0.8rem; color: #9e6d42;"></div>
        </div>

        <div class="lineage-container">
            <div class="tree-title" id="treeTitle">✨ Lineage Tree</div>
            <div id="visualTreeContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading from Supabase...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="adminTab" class="tab-content">
        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-number" id="totalPeopleCount">0</div>
                <div>Total Family Members</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalGenerations">0</div>
                <div>Generations</div>
            </div>
        </div>

        <div class="names-list">
            <h3>📋 All Family Names</h3>
            <div id="namesGrid"></div>
        </div>

        <div class="admin-form">
            <h3>➕ Add New Family Member</h3>
            <form id="addPersonForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="newName" required placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select id="newGender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Parent 1 ID (optional)</label>
                    <input type="text" id="parent1Id" placeholder="Enter parent ID (e.g., p1, g1)">
                </div>
                <div class="form-group">
                    <label>Parent 2 ID (optional)</label>
                    <input type="text" id="parent2Id" placeholder="Enter parent ID">
                </div>
                <button type="submit" id="submitPersonBtn" class="submit-btn">➕ Add Person</button>
            </form>
            <div id="successMsg" class="success-msg"></div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
</div>

<script>
    // ==============================================================
    // YOUR SUPABASE CONFIGURATION (WORKING!)
    // ==============================================================
    const SUPABASE_URL = 'https://snkcdsfzxjruxhwxnoxh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_-IHen1e8xLiVH9_mJBpKmA_0GQSRFJx';

    let currentUser = null;
    let isAdmin = false;
    let FAMILY_DB = { people: [] };

    function showError(message) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = `❌ ${message}`;
        errorDiv.classList.add('show');
        setTimeout(() => errorDiv.classList.remove('show'), 5000);
        console.error('ERROR:', message);
    }

    function showSuccess(message) {
        const successDiv = document.getElementById('successMsg');
        successDiv.textContent = `✅ ${message}`;
        successDiv.classList.add('show');
        setTimeout(() => successDiv.classList.remove('show'), 3000);
    }

    // Load all people from Supabase
    async function loadPeople() {
        try {
            console.log('📥 Loading people from Supabase...');
            const response = await fetch(`${SUPABASE_URL}/rest/v1/people?select=*`, {
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            FAMILY_DB.people = data;
            console.log(`✅ Loaded ${data.length} people`);
            return data;
        } catch (error) {
            console.error('❌ Load error:', error);
            showError(`Failed to load: ${error.message}`);
            throw error;
        }
    }

    // Add a new person to Supabase
    async function addPersonToDB(person) {
        try {
            console.log('📤 Adding person to Supabase:', person);
            const response = await fetch(`${SUPABASE_URL}/rest/v1/people`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify(person)
            });
            
            console.log('📊 Response status:', response.status);
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errorText}`);
            }
            
            console.log('✅ Person added successfully!');
            return true;
        } catch (error) {
            console.error('❌ Add error:', error);
            showError(`Failed to add: ${error.message}`);
            throw error;
        }
    }

    // Delete a person from Supabase
    async function deletePersonFromDB(personId) {
        try {
            console.log('🗑️ Deleting person:', personId);
            const response = await fetch(`${SUPABASE_URL}/rest/v1/people?id=eq.${personId}`, {
                method: 'DELETE',
                headers: {
                    'apikey': SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                }
            });
            
            console.log('📊 Delete response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            console.log('✅ Person deleted successfully!');
            return true;
        } catch (error) {
            console.error('❌ Delete error:', error);
            showError(`Failed to delete: ${error.message}`);
            throw error;
        }
    }

    // Find person by name (partial match)
    function findPersonByPartialName(searchTerm) {
        const term = searchTerm.trim().toLowerCase();
        if (term === "") return null;
        
        let exactMatch = FAMILY_DB.people.find(p => p.name.toLowerCase() === term);
        if (exactMatch) return exactMatch;
        
        let partialMatches = FAMILY_DB.people.filter(p => p.name.toLowerCase().includes(term));
        return partialMatches.length > 0 ? partialMatches[0] : null;
    }

    // Get all ancestors of a person
    function getAncestors(person, visited = new Set()) {
        if (!person || visited.has(person.id)) return [];
        visited.add(person.id);
        let ancestors = [person];
        
        if (person.parents && person.parents.length) {
            let parentsArray = typeof person.parents === 'string' ? JSON.parse(person.parents) : person.parents;
            for (let parentId of parentsArray) {
                const parentObj = FAMILY_DB.people.find(p => p.id === parentId);
                if (parentObj) {
                    ancestors = ancestors.concat(getAncestors(parentObj, visited));
                }
            }
        }
        return ancestors;
    }

    // Build generation levels
    function buildGenerations(ancestors) {
        if (!ancestors.length) return [];
        
        const depthMap = new Map();
        const targetId = ancestors[0].id;
        
        function computeDepth(person, currentDepth) {
            if (!person) return;
            depthMap.set(person.id, currentDepth);
            if (person.parents && person.parents.length) {
                let parentsArray = typeof person.parents === 'string' ? JSON.parse(person.parents) : person.parents;
                for (let pid of parentsArray) {
                    const par = FAMILY_DB.people.find(p => p.id === pid);
                    if (par && !depthMap.has(par.id)) {
                        computeDepth(par, currentDepth + 1);
                    }
                }
            }
        }
        
        const targetPerson = ancestors.find(a => a.id === targetId);
        if (targetPerson) computeDepth(targetPerson, 0);
        
        const groups = new Map();
        for (let anc of ancestors) {
            let d = depthMap.get(anc.id);
            if (d !== undefined) {
                if (!groups.has(d)) groups.set(d, []);
                groups.get(d).push(anc);
            }
        }
        
        const maxDepth = Math.max(...groups.keys());
        const result = [];
        for (let i = 0; i <= maxDepth; i++) {
            result.push(groups.get(i) || []);
        }
        return result;
    }

    // Render the family tree
    function renderLineageTree(searchTerm) {
        const container = document.getElementById("visualTreeContainer");
        const titleSpan = document.getElementById("treeTitle");
        
        if (!searchTerm || searchTerm.trim() === "") {
            container.innerHTML = `<div style="text-align:center;padding:3rem;">🌱 Please enter a family member's name.</div>`;
            return;
        }
        
        const person = findPersonByPartialName(searchTerm);
        if (!person) {
            container.innerHTML = `<div style="text-align:center;padding:3rem;">🍂 No records found for "${escapeHtml(searchTerm)}"</div>`;
            return;
        }
        
        const ancestorsList = getAncestors(person);
        const uniqueAncestors = [];
        const seenIds = new Set();
        for (let a of ancestorsList) {
            if (!seenIds.has(a.id)) {
                seenIds.add(a.id);
                uniqueAncestors.push(a);
            }
        }
        
        const generations = buildGenerations(uniqueAncestors);
        titleSpan.innerHTML = `🌳 Lineage of ${escapeHtml(person.name)}`;
        
        const reversed = [...generations].reverse();
        const genNames = ["👴👵 Great-Grandparents", "👵👴 Grandparents", "👨‍👩‍👧 Parents", "🌟 Current Generation"];
        
        let html = `<div class="family-tree">`;
        for (let idx = 0; idx < reversed.length; idx++) {
            const level = reversed[idx];
            const labelText = genNames[idx] || `Generation ${idx + 1}`;
            html += `<div class="gen-label">${labelText}</div>`;
            html += `<div class="generation">`;
            for (let member of level) {
                html += `<div class="tree-node"><strong>${escapeHtml(member.name)}</strong></div>`;
            }
            html += `</div>`;
            if (idx < reversed.length - 1 && level.length > 0) {
                html += `<div class="connector-line">▼</div>`;
            }
        }
        html += `</div>`;
        container.innerHTML = html;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Update admin panel with latest data
    async function updateAdminPanel() {
        if (!isAdmin) return;
        
        await loadPeople();
        
        document.getElementById('totalPeopleCount').textContent = FAMILY_DB.people.length;
        
        let maxDepth = 0;
        FAMILY_DB.people.forEach(person => {
            let depth = 0;
            let current = person;
            let parents = typeof current.parents === 'string' ? JSON.parse(current.parents) : current.parents;
            while(parents && parents.length > 0) {
                depth++;
                current = FAMILY_DB.people.find(p => p.id === parents[0]);
                if(!current) break;
                parents = typeof current.parents === 'string' ? JSON.parse(current.parents) : current.parents;
            }
            maxDepth = Math.max(maxDepth, depth);
        });
        document.getElementById('totalGenerations').textContent = maxDepth + 1;
        
        const namesGrid = document.getElementById('namesGrid');
        namesGrid.innerHTML = FAMILY_DB.people.map(person => `
            <div class="name-item">
                <div>
                    <strong>${escapeHtml(person.name)}</strong>
                    <br><small>ID: ${person.id} | ${person.gender}</small>
                </div>
                <button class="delete-btn" onclick="deletePersonHandler('${person.id}')">🗑️ Delete</button>
            </div>
        `).join('');
    }

    // Delete person handler (global for onclick)
    window.deletePersonHandler = async function(personId) {
        const person = FAMILY_DB.people.find(p => p.id === personId);
        if (!person) return;
        
        if (confirm(`Are you sure you want to delete "${person.name}"?`)) {
            try {
                await deletePersonFromDB(personId);
                await updateAdminPanel();
                showSuccess(`"${person.name}" deleted successfully!`);
            } catch (error) {
                // Error already shown
            }
        }
    };

    // Add new person from form
    async function addNewPerson(event) {
        event.preventDefault();
        console.log('🎯 Add person form submitted!');
        
        const name = document.getElementById('newName').value.trim();
        const gender = document.getElementById('newGender').value;
        const parent1Id = document.getElementById('parent1Id').value.trim();
        const parent2Id = document.getElementById('parent2Id').value.trim();
        
        console.log('Form values:', { name, gender, parent1Id, parent2Id });
        
        if (!name) {
            showError('Please enter a name');
            return;
        }
        
        // Check if name already exists
        if (FAMILY_DB.people.some(p => p.name.toLowerCase() === name.toLowerCase())) {
            showError(`"${name}" already exists!`);
            return;
        }
        
        const parents = [];
        if (parent1Id) parents.push(parent1Id);
        if (parent2Id) parents.push(parent2Id);
        
        const newPerson = {
            id: name.toLowerCase().replace(/\s/g, '_') + '_' + Date.now(),
            name: name,
            gender: gender,
            parents: JSON.stringify(parents)
        };
        
        console.log('📦 New person object:', newPerson);
        
        try {
            await addPersonToDB(newPerson);
            await updateAdminPanel(); // This reloads the data
            
            // Clear form
            document.getElementById('addPersonForm').reset();
            showSuccess(`"${name}" added successfully!`);
            
            console.log('🎉 Person added and UI updated!');
        } catch (error) {
            console.error('💥 Error in addNewPerson:', error);
            // Error already shown in addPersonToDB
        }
    }

    // Auth check
    function checkAuth() {
        currentUser = sessionStorage.getItem('currentUser');
        isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        
        console.log('Auth check:', { currentUser, isAdmin });
        
        if (!currentUser) {
            window.location.href = 'login.html';
            return false;
        }
        
        document.getElementById('usernameDisplay').textContent = currentUser;
        if (isAdmin) {
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminTabBtn').style.display = 'block';
        }
        return true;
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = 'login.html';
    }

    // Initialize the app
    async function init() {
        console.log('🚀 Initializing app...');
        
        if (!checkAuth()) return;
        
        try {
            await loadPeople();
            
            if (isAdmin) {
                await updateAdminPanel();
                console.log('👑 Admin panel ready');
            }
            
            document.getElementById('visualTreeContainer').innerHTML = '<div style="text-align:center;padding:3rem;">🔍 Enter a name above to see the family roots.</div>';
            console.log('✅ App initialized successfully with', FAMILY_DB.people.length, 'people');
        } catch (error) {
            console.error('❌ Init error:', error);
            document.getElementById('visualTreeContainer').innerHTML = `
                <div style="text-align:center;padding:3rem;color:#c33;">
                    ❌ Failed to load data: ${error.message}
                </div>
            `;
        }
    }

    // Set up event listeners
    function setupEventListeners() {
        console.log('🔧 Setting up event listeners...');
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const searchValue = document.getElementById('searchName').value;
            renderLineageTree(searchValue);
        });
        
        const addForm = document.getElementById('addPersonForm');
        if (addForm) {
            console.log('✅ Found addPersonForm, attaching submit listener');
            addForm.addEventListener('submit', addNewPerson);
        } else {
            console.error('❌ Could not find addPersonForm!');
        }
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${tabName}Tab`).classList.add('active');
            });
        });
    }

    // Start the app
    setupEventListeners();
    init();
</script>
</body>
</html>
