<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login | Ancestral Threads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "🌳";
            position: absolute;
            font-size: 300px;
            opacity: 0.05;
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }

        body::after {
            content: "📜";
            position: absolute;
            font-size: 250px;
            opacity: 0.05;
            top: -50px;
            left: -50px;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #666;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .info-message {
            background: #f0f4ff;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #667eea;
            text-align: center;
        }

        .info-message strong {
            color: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .admin-badge {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            color: gold;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-family: monospace;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #667eea;
        }

        .password-wrapper {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>🌳 Ancestral Threads</h1>
                <p>trace your roots · honor your bloodline</p>
            </div>

            <div class="input-group">
                <label>👤 Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
            </div>

            <div class="input-group">
                <label>🔒 Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="Enter your password">
                    <span class="toggle-password" onclick="togglePassword()">👁️</span>
                </div>
            </div>

            <button class="login-btn" id="loginBtn">Enter the Grove 🌿</button>

            <div class="info-message">
                💡 <strong>Demo Accounts:</strong><br>
                👑 Admin: username <strong>admin</strong> | password <strong>admin123</strong><br>
                👤 Regular User: username <strong>user</strong> | password <strong>user123</strong><br>
                📝 Or register a new account below
            </div>

            <div class="info-message" style="margin-top: 0.5rem; background: #e8f5e9; color: #2e7d32;">
                ✨ <strong>New User?</strong> Just enter any username and password to create an account!
            </div>

            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>
    <div class="admin-badge">🔐 Secure Login</div>

    <script>
        // User database stored in localStorage
        let users = [];

        function loadUsers() {
            const saved = localStorage.getItem('family_lineage_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                // Default users
                users = [
                    { username: 'admin', password: 'admin123', isAdmin: true },
                    { username: 'user', password: 'user123', isAdmin: false }
                ];
                saveUsers();
            }
        }

        function saveUsers() {
            localStorage.setItem('family_lineage_users', JSON.stringify(users));
        }

        function registerUser(username, password) {
            // Check if user already exists
            if (users.find(u => u.username === username)) {
                return false;
            }
            users.push({ username: username, password: password, isAdmin: false });
            saveUsers();
            return true;
        }

        function authenticateUser(username, password) {
            const user = users.find(u => u.username === username);
            if (user && user.password === password) {
                return user;
            }
            return null;
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorDiv = document.getElementById('errorMessage');

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        function login() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username) {
                showError('❌ Please enter a username');
                return;
            }

            if (!password) {
                showError('❌ Please enter a password');
                return;
            }

            // Try to authenticate
            let user = authenticateUser(username, password);
            
            if (!user) {
                // User doesn't exist, register new user
                if (registerUser(username, password)) {
                    user = authenticateUser(username, password);
                    showError('✅ Account created! Logging in...');
                    setTimeout(() => {
                        sessionStorage.setItem('currentUser', username);
                        sessionStorage.setItem('isAdmin', 'false');
                        window.location.href = 'platform.html';
                    }, 1000);
                    return;
                }
            }
            
            if (user) {
                sessionStorage.setItem('currentUser', username);
                sessionStorage.setItem('isAdmin', user.isAdmin ? 'true' : 'false');
                window.location.href = 'platform.html';
            } else {
                showError('❌ Invalid username or password');
            }
        }

        loadUsers();
        loginBtn.addEventListener('click', login);
        
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
