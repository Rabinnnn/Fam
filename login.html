<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Login & Signup | Ancestral Threads</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "🌳";
            position: absolute;
            font-size: 300px;
            opacity: 0.05;
            bottom: -50px;
            right: -50px;
            pointer-events: none;
        }

        body::after {
            content: "📜";
            position: absolute;
            font-size: 250px;
            opacity: 0.05;
            top: -50px;
            left: -50px;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo p {
            color: #666;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e0e0e0;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            background: transparent;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .auth-form {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .auth-form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f9f9f9;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            color: #667eea;
            font-size: 1.2rem;
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .auth-btn:active {
            transform: translateY(0);
        }

        .info-message {
            background: #f0f4ff;
            padding: 1rem;
            border-radius: 1rem;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #667eea;
            text-align: center;
        }

        .info-message strong {
            color: #764ba2;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .success-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .admin-badge {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: rgba(0,0,0,0.7);
            color: gold;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <h1>🌳 Ancestral Threads</h1>
                <p>trace your roots · honor your bloodline</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" data-form="login">🔐 Login</button>
                <button class="auth-tab" data-form="signup">📝 Sign Up</button>
            </div>

            <div id="loginForm" class="auth-form active">
                <div class="input-group">
                    <label>👤 Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>🔒 Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                        <span class="toggle-password" onclick="togglePassword('loginPassword')">👁️</span>
                    </div>
                </div>

                <button class="auth-btn" id="loginBtn">Login 🌿</button>
            </div>

            <div id="signupForm" class="auth-form">
                <div class="input-group">
                    <label>👤 Username *</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username (min 3 characters)" autocomplete="off">
                </div>

                <div class="input-group">
                    <label>📧 Email (optional)</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com">
                </div>

                <div class="input-group">
                    <label>🔒 Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Choose a password (min 6 characters)">
                        <span class="toggle-password" onclick="togglePassword('signupPassword')">👁️</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>✓ Confirm Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                        <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>

                <button class="auth-btn" id="signupBtn">Create Account ✨</button>
            </div>

            <!-- <div class="info-message">
                💡 <strong>Demo Admin Account:</strong><br>
                Username: <strong>admin</strong> | Password: <strong>admin123</strong>
            </div> -->

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>
    <div class="admin-badge">🔐 Secure Authentication</div>

    <script>
        let users = [];

        function loadUsers() {
            const saved = localStorage.getItem('family_lineage_users');
            if (saved) {
                users = JSON.parse(saved);
            } else {
                users = [
                    { 
                        username: 'admin', 
                        password: 'admin123', 
                        email: 'admin@familytree.com',
                        isAdmin: true,
                        createdAt: new Date().toISOString()
                    }
                ];
                saveUsers();
            }
        }

        function saveUsers() {
            localStorage.setItem('family_lineage_users', JSON.stringify(users));
        }

        function validatePassword(password) {
            if (password.length < 6) return { valid: false, message: 'Password must be at least 6 characters' };
            return { valid: true, message: '' };
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 3000);
        }

        function signup() {
            const username = document.getElementById('signupUsername').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!username) {
                showError('❌ Please enter a username');
                return;
            }

            if (username.length < 3) {
                showError('❌ Username must be at least 3 characters');
                return;
            }

            if (!password) {
                showError('❌ Please enter a password');
                return;
            }

            const passwordValidation = validatePassword(password);
            if (!passwordValidation.valid) {
                showError(`❌ ${passwordValidation.message}`);
                return;
            }

            if (password !== confirm) {
                showError('❌ Passwords do not match');
                return;
            }

            if (users.find(u => u.username === username)) {
                showError('❌ Username already exists. Please choose another one.');
                return;
            }

            const newUser = {
                username: username,
                password: password,
                email: email || null,
                isAdmin: false,
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            saveUsers();
            
            showSuccess('✅ Account created successfully! Please login.');
            
            document.getElementById('signupUsername').value = '';
            document.getElementById('signupEmail').value = '';
            document.getElementById('signupPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            document.querySelector('.auth-tab[data-form="login"]').click();
        }

        function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username) {
                showError('❌ Please enter your username');
                return;
            }

            if (!password) {
                showError('❌ Please enter your password');
                return;
            }

            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                sessionStorage.setItem('currentUser', username);
                sessionStorage.setItem('isAdmin', user.isAdmin ? 'true' : 'false');
                window.location.href = 'platform.html';
            } else {
                showError('❌ Invalid username or password. Please sign up if you don\'t have an account.');
            }
        }

        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        }

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const formType = tab.dataset.form;
                
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                document.getElementById('loginForm').classList.remove('active');
                document.getElementById('signupForm').classList.remove('active');
                document.getElementById(`${formType}Form`).classList.add('active');
                
                document.getElementById('errorMessage').classList.remove('show');
                document.getElementById('successMessage').classList.remove('show');
            });
        });

        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('signupBtn').addEventListener('click', signup);
        
        document.getElementById('loginUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        document.getElementById('signupUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signup();
        });
        document.getElementById('signupPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signup();
        });
        document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') signup();
        });

        loadUsers();
        window.togglePassword = togglePassword;
    </script>
</body>
</html>
