<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Ancestral Threads</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .error-container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 2rem;
            max-width: 500px;
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        h1 { font-size: 4rem; margin: 0; color: #667eea; }
        p { color: #666; margin: 1rem 0; }
        a {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 2rem;
            text-decoration: none;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>🌳 Oops! The page you're looking for has wandered off the family tree.</p>
        <a href="/login.html">Return to Login</a>
    </div>
</body>
</html>
